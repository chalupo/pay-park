<!DOCTYPE html>
<html>
<head>
<title>Pagar Estacionamiento</title>
<link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Librería QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<header>
Pago de Estacionamiento
<nav>
<a href="panel_usuario.html">Mi historial</a>
<a onclick="logout()">Salir</a>
</nav>
</header>

<main>

<div class="panel">

<h2>Pagar estacionamiento</h2>

<input id="placa" placeholder="Placa del vehículo">
<input id="horas" type="number" placeholder="Horas">

<button onclick="pagar()">Pagar</button>

<p id="estadoPago" style="color:red;">No pagado</p>

<hr>

<h3>Salida del estacionamiento</h3>

<button onclick="generarQR()">Generar QR de salida</button>

<div id="qr"></div>

</div>
<p><strong>Datos del QR:</strong></p>
<textarea id="qrTexto" rows="4" style="width:100%;"></textarea>

</main>

<script src="app.js"></script>

<script>
function generarQR() {
    const placa = document.getElementById("placa").value;

    if (!placa) {
        alert("Ingresa la placa primero");
        return;
    }

    const pagoActual = JSON.parse(localStorage.getItem("pagoActual"));

    if (!pagoActual || pagoActual.placa !== placa) {
        alert("Debes pagar antes de generar el QR de salida");
        return;
    }

    document.getElementById("qr").innerHTML = "";

    const datos = JSON.stringify({
        tipo: "SALIDA",
        placa: placa,
        fecha: new Date().toISOString()
    });

    new QRCode(document.getElementById("qr"), {
        text: datos,
        width: 200,
        height: 200
    });

    document.getElementById("qrTexto").value = datos;

    localStorage.setItem("qrGenerado", datos);
}
</script>

</body>
</html>
