<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header>
        PayPark
        <nav>
            <a href="registro.html">Registro</a>
        </nav>

    </main>

    <script src="app.js"></script>
</body>
</html>
