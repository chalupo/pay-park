<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PayPark</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =======================
   BASE
======================= */
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

/* =======================
   ANIMACIÓN APP
======================= */
@keyframes appIn {
    from {
        opacity:0;
        transform:scale(0.95) translateY(10px);
    }
    to {
        opacity:1;
        transform:scale(1) translateY(0);
    }
}

.panel, .card, .stat, .chart-box {
    animation: appIn 0.4s ease-out;
}

/* =======================
   HEADER
======================= */
header{
    background:#2c3e50;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    width:55px;
    height:55px;
    background:white;
    padding:5px;
    border-radius:12px;
}

.menu-icon{
    font-size:28px;
    cursor:pointer;
}

/* =======================
   MENU
======================= */
nav{
    position:fixed;
    top:0;
    right:-260px;
    width:240px;
    height:100%;
    background:#34495e;
    padding-top:70px;
    transition:0.3s;
    z-index:1001;
}

nav.active{
    right:0;
}

nav a{
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
    padding:15px;
    text-decoration:none;
}

nav a:hover{
    background:rgba(255,255,255,0.1);
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

/* =======================
   BANNER
======================= */
.banner{
    height:380px;
    position:relative;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
}

.slide.active{
    opacity:1;
}

.banner-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
}

/* =======================
   STATS
======================= */
.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
}

.stat{
    background:white;
    padding:18px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.3s;
}

.stat:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

/* =======================
   LOGIN CARD
======================= */
.card{
    width:320px;
    margin:25px auto;
    padding:30px;
    border-radius:16px;
    text-align:center;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* INPUTS */
.input-box{
    display:flex;
    align-items:center;
    background:#f1f3f6;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.input-box i{
    margin-right:10px;
    color:#2c3e50;
}

.input-box input{
    border:none;
    outline:none;
    background:transparent;
    width:100%;
}

/* =======================
   BOTÓN PRO + RIPPLE
======================= */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2c3e50;
    color:white;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:0.2s;
}

button:hover{
    background:#34495e;
}

button:active{
    transform:scale(0.96);
}

/* ripple */
button span{
    position:absolute;
    background:rgba(255,255,255,0.4);
    border-radius:50%;
    transform:scale(0);
    animation:ripple 0.6s linear;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

/* =======================
   DASHBOARD
======================= */
.chart-box{
    width:90%;
    max-width:600px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">
    <img src="img/logo.png">
    <h1>PayPark</h1>
</div>

<div class="menu-icon" onclick="toggleMenu()">
    <i class="fa fa-bars"></i>
</div>

</header>

<!-- MENU -->
<nav id="menu">

<a href="index.html"><i class="fa fa-house"></i> Inicio</a>
<a href="registro.html"><i class="fa fa-user-plus"></i> Registro</a>
<a href="panel_usuario.html"><i class="fa fa-user"></i> Usuario</a>
<a href="panel_admin.html"><i class="fa fa-lock"></i> Admin</a>
<a href="ventana-pago.html"><i class="fa fa-credit-card"></i> Pago</a>
<a href="barrera_salida.html"><i class="fa fa-warehouse"></i> Salida</a>

</nav>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- BANNER -->
<section class="banner">

<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" class="slide active">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7" class="slide">

<div class="banner-text">
<h2>Estacionamiento Inteligente</h2>
<p>Sistema moderno y seguro</p>
</div>

</section>

<!-- STATS -->
<section class="stats">

<div class="stat">
<h3>120</h3>
<p>Autos</p>
</div>

<div class="stat">
<h3>45</h3>
<p>Ocupados</p>
</div>

<div class="stat">
<h3 id="cajonesDisponibles">45</h3>
<p>Cajones disponibles</p>
</div>

</section>

<!-- LOGIN -->
<main>

<div class="card">

<h2>Bienvenido a PayPark</h2>
<p>Accede a tu sistema</p>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input id="email" type="email" placeholder="Correo">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input id="password" type="password" placeholder="Contraseña">
</div>

<button onclick="login(event)">Entrar</button>

</div>

</main>

<script>

/* MENU */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

/* SLIDER */
let i=0;
const slides=document.querySelectorAll(".slide");

setInterval(()=>{
    slides.forEach(s=>s.classList.remove("active"));
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},3000);

/* RIPPLE EFFECT */
document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click", function(e){

        let circle = document.createElement("span");
        let rect = this.getBoundingClientRect();

        let size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = (e.clientX - rect.left - size/2) + "px";
        circle.style.top = (e.clientY - rect.top - size/2) + "px";

        this.appendChild(circle);

        setTimeout(()=>circle.remove(),600);

    });
});

</script>

<script src="app.js"></script>

</body>
</html>
